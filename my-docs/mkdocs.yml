site_name: EazyLiving Docs
dev_addr: '127.0.0.1:8080'
site_description: User and developer documentation for the EazyLiving property management platform
site_author: EazyLiving Team

nav:
  - Home: index.md
  - User Guide: USER_GUIDE.md

theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.instant
    - navigation.top
    - toc.integrate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true
