[alembic]
script_location = migrations
prepend_sys_path = .

# The URL is overridden in env.py from settings, so this is just a placeholder.
sqlalchemy.url = postgresql+asyncpg://postgres:aswadhardi@aswadhardi:5432/eazyliving

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S